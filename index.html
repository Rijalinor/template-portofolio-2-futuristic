<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Futuristic Developer Portfolio</title>
  <meta name="description" content="A bold, modern, and futuristic developer portfolio template." />
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <!-- AOS CSS -->
  <link href="node_modules/aos/dist/aos.css" rel="stylesheet" />
  <!-- Boxicons -->
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <!-- Global CSS -->
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
  <!-- Custom Cursor -->
  <div class="cursor-dot" data-cursor-dot></div>
  <div class="cursor-outline" data-cursor-outline></div>

  <div id="tsparticles"></div>

  <div id="app">
    <!-- Dynamic Sections will be injected here -->
    <header id="hero" class="section"></header>
    <section id="about" class="section"></section>
    <section id="skills" class="section"></section>
    <section id="experience" class="section"></section>
    <section id="projects" class="section"></section>
    <section id="contact" class="section"></section>
    <footer id="footer"></footer>
  </div>

  <!-- Main JS -->
  <script type="module" src="/src/main.js"></script>
</body>

</html>
